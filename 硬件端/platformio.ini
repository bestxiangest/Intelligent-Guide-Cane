; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Keep build artifacts outside the Chinese-named project folder. The ESP32
; linker can fail to create firmware.map when the build path contains Chinese.
build_dir = ../.pio-build-hardware

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.partitions = default_16MB.csv
board_build.filesystem = littlefs
board_build.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
build_flags = -DBOARD_HAS_PSRAM
board_upload.flash_size = 16MB
lib_deps = 
	bblanchon/ArduinoJson@^7.3.1
	densaugeo/base64@^1.4.0
	plageoj/UrlEncode@^1.0.1
	gamegine/HCSR04 ultrasonic sensor@^2.0.0
